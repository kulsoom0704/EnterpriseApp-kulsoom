<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Contact Hope NGO</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen"
      style="
          background-image: url('/images/background.png');
          background-size: cover;
          background-position: center;
          background-attachment: fixed;">

<!--<nav class="bg-amber-800 text-white p-5 flex gap-8 shadow-lg">-->
<!--    <a th:href="@{/}" class="font-bold">HOPE NGO</a>-->
<!--    <a th:href="@{/}">Home</a>-->
<!--    <a th:href="@{/about}">About</a>-->
<!--    <a th:href="@{/contact}">Contact</a>-->
<!--</nav>-->

<nav class="bg-amber-800 text-white p-5 flex gap-8 shadow-lg">

    <a th:href="@{/}" class="font-bold hover:text-amber-200 transition">
        Hope NGO
    </a>
    <a th:href="@{/}" class="hover:text-amber-200 transition">
        Home
    </a>

    <a th:href="@{/new}" class="hover:text-amber-200 transition">
        New
    </a>

    <a th:href="@{/about}" class="hover:text-amber-200 transition">
        About
    </a>

    <a th:href="@{/contact}" class="hover:text-amber-200 transition">
        Contact
    </a>

</nav>
<div class="max-w-4xl mx-auto mt-10 p-8
            bg-white/70
            backdrop-blur-md
            rounded-3xl
            shadow-2xl
            border border-white/40">

    <h1 class="text-3xl font-bold mb-6">
        Contact Us
    </h1>

    <div th:if="${error}"
         class="bg-red-100 text-red-800 p-3 rounded mb-4">
        Failed to send message. Please fill in all fields correctly.
    </div>

    <div th:if="${success}"
         class="bg-green-100 text-green-800 p-3 rounded mb-4">
        Your message has been sent successfully.
    </div>

    <form th:action="@{/contact}"
          th:object="${contactForm}"
          method="post"
          class="space-y-4">

        <div>
            <label class="block mb-1">Name</label>
            <input type="text"
                   th:field="*{name}"
                   class="w-full border p-2 rounded">
        </div>

        <div>
            <label class="block mb-1">Email</label>
            <input type="email"
                   th:field="*{email}"
                   class="w-full border p-2 rounded">
        </div>

        <div>
            <label class="block mb-1">Message</label>
            <textarea rows="5"
                      th:field="*{message}"
                      class="w-full border p-2 rounded"></textarea>
        </div>

<!--        <button type="submit"-->
<!--                class="bg-blue-600 text-white px-4 py-2 rounded">-->
<!--            Send Message-->
<!--        </button>-->

        <button type="submit"
                class="bg-amber-800 hover:bg-amber-900 text-white px-6 py-3 rounded-xl shadow-lg transition duration-300">
            Send Message
        </button>
    </form>
</div>

<footer class="text-center mt-10 p-4">
    © 2026 Hope NGO
</footer>

</body>
</html>
