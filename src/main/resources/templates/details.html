<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Event Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<nav class="bg-blue-600 text-white p-4 flex gap-6">
    <a th:href="@{/}" class="font-bold">Hope NGO</a>
    <a th:href="@{/new}">Contact</a>
    <a th:href="@{/about}">About</a>
</nav>

<div class="max-w-3xl mx-auto mt-10 bg-white p-6 rounded shadow">

    <h1 class="text-3xl font-bold mb-6">Event Details</h1>

    <div class="space-y-4">

        <div>
            <strong>Title:</strong>
            <p th:text="${event.title}"></p>
        </div>

        <div>
            <strong>Organization:</strong>
            <p th:text="${event.organization}"></p>
        </div>

        <div>
            <strong>Description:</strong>
            <p th:text="${event.description}"></p>
        </div>

        <div>
            <strong>Email Contact:</strong>
            <p th:text="${event.emailContactPerson}"></p>
        </div>

        <div>
            <strong>Date & Time:</strong>
            <p th:text="${event.time}"></p>
        </div>

    </div>

    <div class="mt-6">
        <a th:href="@{/}"
           class="bg-gray-500 text-white px-4 py-2 rounded">
            Back
        </a>
    </div>

</div>

<footer class="text-center mt-10 p-4">
    © 2026 Hope NGO
</footer>

</body>
</html>
