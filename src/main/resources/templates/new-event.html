<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>New Event</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen"
      style="
          background-image: url('/images/background.png');
          background-size: cover;
          background-position: center;
          background-attachment: fixed;">

<nav class="bg-amber-800 text-white p-5 flex gap-8 shadow-lg">
    <a th:href="@{/}" class="font-bold">HOPE NGO</a>
    <a th:href="@{/}">Home</a>
    <a th:href="@{/contact}">About</a>
    <a th:href="@{/about}">Contact</a>
</nav>

<!--<div class="max-w-3xl mx-auto mt-10 bg-white p-6 rounded shadow">-->
<div class="max-w-4xl mx-auto mt-10 p-8
            bg-white/70
            backdrop-blur-md
            rounded-3xl
            shadow-2xl
            border border-white/40">

    <h1 class="text-3xl font-bold mb-6">
        Create New Event
    </h1>

    <form th:action="@{/new}" th:object="${event}" method="post"
          class="space-y-4">

        <div>
            <label class="block mb-1">Title</label>
            <input type="text"
                   th:field="*{title}"
                   class="w-full border p-2 rounded">
        </div>

        <div>
            <label class="block mb-1">Organization</label>
            <input type="text"
                   th:field="*{organization}"
                   class="w-full border p-2 rounded">
        </div>

        <div>
            <label class="block mb-1">Description</label>
            <textarea th:field="*{description}"
                      class="w-full border p-2 rounded"></textarea>
        </div>

        <div>
            <label class="block mb-1">Email Contact</label>
            <input type="email"
                   th:field="*{emailContactPerson}"
                   class="w-full border p-2 rounded">
        </div>

        <div>
            <label class="block mb-1">Time</label>
            <input type="datetime-local"
                   th:field="*{time}"
                   class="w-full border p-2 rounded">
        </div>

<!--        <button type="submit"-->
<!--                class="bg-blue-600 text-white px-4 py-2 rounded">-->
<!--            Save Event-->
<!--        </button>-->
        <button type="submit"
                class="bg-amber-800 hover:bg-amber-900 text-white px-6 py-3 rounded-xl shadow-lg transition duration-300">
            Save Event
        </button>
    </form>

</div>

</body>
</html>
